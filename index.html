<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Página Personal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Mi Página Personal ✨</h1>
  <p>Proyecto escolar y bienestar animal 🐾</p>
</header>

<nav>
  <a href="#sobre-mi">Sobre mí</a>
  <a href="#pec">Proyecto PEC</a>
  <a href="#galeria">Galería</a>
  <a href="#preguntas">Preguntas</a>
</nav>

<section id="sobre-mi" class="card">
  <h2>Sobre mí 🌸</h2>

  <p id="mensaje2"></p>
  <button onclick="mostrarMensaje2(event)">Algo sobre mí</button>

  <img src="img/tarjeta.png" alt="Foto personal">
  <p>Hola, mi nombre es Julissa.</p>
</section>

<section id="pec" class="card">
  <h2>Proyecto PEC 🐾</h2>

  <p id="mensaje"></p>
  <button onclick="mostrarMensaje(event)">Mostrar mensaje</button>

  <img src="img/banner_pec.png" alt="Proyecto PEC">
</section>

<section id="galeria" class="card">
  <h2>Galería 📸</h2>

  <div class="slider">
    <img class="slide active" src="img/perro1.jpg">
    <img class="slide" src="img/perro2.jpg">
    <img class="slide" src="img/perro3.jpg">
  </div>
</section>

<section id="preguntas" class="card">
  <h2>Preguntas Frecuentes 🐾</h2>

  <div class="faq">
    <button class="faq-btn">¿Qué busca el proyecto?</button>
    <div class="faq-texto"><p>Cuidado responsable animal.</p></div>
  </div>

  <div class="faq">
    <button class="faq-btn">¿Por qué esterilizar?</button>
    <div class="faq-texto"><p>Reduce sobrepoblación.</p></div>
  </div>

</section>

<footer>
  <p>© 2026 - Yulii 💖</p>
</footer>

<script src="script.js"></script>
</body>
</html>
